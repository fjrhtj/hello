<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이순신 장군 주요 해전 타임라인 지도</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* 우측 상단 컨트롤러 스타일 */
        .control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            width: 280px;
        }
        .control-panel h3 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 18px;
            border-bottom: 2px solid #7f8c8d;
            padding-bottom: 5px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            background-color: #2980b9;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #3498db;
        }
        button#stopBtn {
            background-color: #e74c3c;
        }
        button#stopBtn:hover {
            background-color: #c0392b;
        }
        .status-box {
            background: #ecf0f1;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            line-height: 1.5;
        }
        .status-title {
            font-weight: bold;
            color: #c0392b;
        }
        /* 팝업 스타일 커스텀 */
        .leaflet-popup-content-value h4 {
            margin: 5px 0;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel">
        <h3>忠武公 이순신 해전 탐방</h3>
        <div class="btn-group">
            <button id="nextBtn" onclick="nextBattle()">다음 전투</button>
            <button id="playBtn" onclick="startAutoPlay()">자동 재생</button>
            <button id="stopBtn" onclick="stopAutoPlay()" style="display:none;">정지</button>
        </div>
        <div class="status-box">
            <div id="currentInfo"><strong>[안내]</strong> 버튼을 누르면 순서대로 해전지로 이동합니다.</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. 이순신 장군 주요 해전 데이터 (순서대로 배치)
        const battles = [
            {
                name: "옥포 해전",
                date: "1592년 5월 7일",
                coords: [34.9015, 128.6995], // 거제 옥포
                desc: "임진왜란 발생 후 이순신 장군의 <b>첫 승리</b>이자 조선 수군의 첫 승전보."
            },
            {
                name: "사천 해전",
                date: "1592년 5월 29일",
                coords: [34.9351, 128.0435], // 사천 선진리성 앞바다
                desc: "역사상 최초로 <b>거북선(귀선)</b>이 실전에 투입되어 돌격선으로 맹활약한 해전."
            },
            {
                name: "한산도 대첩",
                date: "1592년 7월 8일",
                coords: [34.7570, 128.4411], // 통영 한산도 앞바다
                desc: "유명한 <b>학익진(鶴翼陣)</b> 전술을 펼쳐 왜 수군의 주력을 섬멸한 임진왜란 3대 대첩 중 하나."
            },
            {
                name: "명량 대첩",
                date: "1592년 9월 16일 (정유재란)",
                coords: [34.5714, 126.3041], // 진도 울돌목
                desc: "<i>'신에게는 아직 12척의 배가 남아있사옵니다'</i><br>단 13척의 배로 133척의 왜선을 격파한 기적 같은 승리."
            },
            {
                name: "노량 대첩",
                date: "1598년 11월 19일",
                coords: [34.9427, 127.8576], // 남해 노량해협
                desc: "임진왜란의 마지막 결전. 이순신 장군이 <i>'나의 죽음을 알리지 말라'</i>는 유언을 남기고 전사하신 곳."
            }
        ];

        // 2. 지도 초기화 (남해안 전체가 보이도록 중심점 설정)
        const map = L.map('map').setView([34.75, 127.8], 9);

        // 3. 지도 배경(Tile Layer) 설정 - OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 4. 지도에 마커 및 순서 번호 표시하기
        const markers = [];
        battles.forEach((battle, index) => {
            // 마커 생성 및 정보 팝업 바인딩
            const marker = L.marker(battle.coords).addTo(map);
            
            const popupContent = `
                <div class="leaflet-popup-content-value">
                    <h4><b>${index + 1}. ${battle.name}</b></h4>
                    <small>📅 ${battle.date}</small>
                    <p style="margin-top:8px; font-size:13px;">${battle.desc}</p>
                </div>
            `;
            marker.bindPopup(popupContent);
            markers.push(marker);
        });

        // 5. 제어용 변수
        let currentIndex = -1;
        let timerId = null;

        // 6. 특정 순서의 전투로 이동하는 함수
        function moveToBattle(index) {
            if (index < 0 || index >= battles.length) return;
            
            currentIndex = index;
            const battle = battles[currentIndex];
            
            // 지도 이동 (부드럽게 날아가기, 줌 레벨 12)
            map.flyTo(battle.coords, 12, {
                animate: true,
                duration: 1.5 // 이동 시간(초)
            });

            // 지도 이동이 어느 정도 완료된 후 팝업 열기 및 정보 업데이트
            setTimeout(() => {
                markers[currentIndex].openPopup();
                document.getElementById('currentInfo').innerHTML = `
                    <span class="status-title">▶ [${currentIndex + 1}/${battles.length}] ${battle.name}</span><br>
                    <small>${battle.date}</small><br>
                    ${battle.desc}
                `;
            }, 1000);
        }

        // 7. [다음 전투] 버튼 이벤트
        function nextBattle() {
            let nextIndex = currentIndex + 1;
            if (nextIndex >= battles.length) {
                nextIndex = 0; // 마지막에 도달하면 처음으로 복귀
            }
            moveToBattle(nextIndex);
        }

        // 8. [자동 재생] 기능 구현
        function startAutoPlay() {
            document.getElementById('playBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            
            // 즉시 첫 이동 시작 후 4초마다 반복
            nextBattle();
            timerId = setInterval(() => {
                nextBattle();
            }, 4500); 
        }

        // 9. [정지] 기능 구현
        function stopAutoPlay() {
            document.getElementById('playBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
        }
    </script>
</body>
</html>
